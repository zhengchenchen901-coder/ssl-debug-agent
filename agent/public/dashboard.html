<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Remote Debug Agent</title>
    <link rel="stylesheet" href="/dashboard.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="title-block">
        <p class="eyebrow">Remote Debug Agent</p>
        <h1>远端交互实时面板</h1>
      </div>
      <div class="connection" aria-live="polite">
        <span id="connectionDot" class="dot pending"></span>
        <span id="connectionText">连接中</span>
      </div>
    </header>

    <main>
      <section class="metrics" aria-label="运行状态">
        <div class="metric">
          <span>目标</span>
          <strong id="targetHost">未配置</strong>
        </div>
        <div class="metric">
          <span>来源</span>
          <strong id="lastSource">--</strong>
        </div>
        <div class="metric">
          <span>活动</span>
          <strong id="totalCount">0</strong>
        </div>
        <div class="metric">
          <span>失败</span>
          <strong id="errorCount">0</strong>
        </div>
      </section>

      <section class="layout">
        <aside class="sidebar" aria-label="筛选与配置">
          <section class="panel">
            <h2>筛选</h2>
            <div class="filter-grid" id="filters">
              <button class="filter active" type="button" data-filter="all">全部</button>
              <button class="filter" type="button" data-filter="run">命令</button>
              <button class="filter" type="button" data-filter="read-file">文件</button>
              <button class="filter" type="button" data-filter="list-dir">目录</button>
              <button class="filter" type="button" data-filter="failed">失败</button>
            </div>
          </section>

          <section class="panel">
            <h2>允许路径</h2>
            <ul id="allowedPaths" class="path-list"></ul>
          </section>

          <section class="panel">
            <h2>限制</h2>
            <dl class="limits">
              <div>
                <dt>命令超时</dt>
                <dd id="timeoutLimit">--</dd>
              </div>
              <div>
                <dt>输出上限</dt>
                <dd id="outputLimit">--</dd>
              </div>
            </dl>
          </section>
        </aside>

        <section class="timeline-panel" aria-label="实时事件">
          <div class="timeline-toolbar">
            <div>
              <h2>实时事件</h2>
              <p id="lastEvent">等待插件调用</p>
            </div>
            <div class="toolbar-actions">
              <button id="pauseButton" type="button">暂停</button>
              <button id="clearButton" type="button">清空视图</button>
            </div>
          </div>

          <div id="emptyState" class="empty-state">
            当前还没有远端交互事件。
          </div>
          <ol id="timeline" class="timeline" aria-live="polite"></ol>
        </section>
      </section>
    </main>

    <script src="/dashboard.js" type="module"></script>
  </body>
</html>
